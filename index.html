<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Phase 2 Live</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; border-top: 4px solid var(--primary); }
        
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { color: #8b949e; font-size: 0.75rem; margin-bottom: 20px; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; padding: 15px; background: rgba(0,255,163,0.03); border-radius: 15px; border: 1px solid #30363d; }
        .t-num { display: block; font-size: 1.3rem; font-weight: bold; color: var(--primary); font-family: 'Orbitron'; }
        .t-label { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; font-weight: 600; }

        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s ease; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { box-shadow: 0 0 25px rgba(0,255,163,0.5); transform: translateY(-3px); }
        
        .trade-container { background: #010409; border: 1px solid #30363d; padding: 20px; border-radius: 16px; margin: 20px 0; text-align: left; display: none; animation: slideIn 0.4s ease-out; }
        input { background: transparent; border: none; color: white; font-size: 1.5rem; width: 100%; outline: none; font-weight: bold; margin-top: 5px; }
        #status-display { margin-top: 15px; font-size: 0.8rem; display: none; padding: 10px; border-radius: 8px; border: 1px solid; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <p class="subtitle">DECENTRALIZED NODE ACCESS</p>
    
    <div class="timer-grid">
        <div><span class="t-num" id="days">30</span><span class="t-label">Days</span></div>
        <div><span class="t-num" id="hours">00</span><span class="t-label">Hrs</span></div>
        <div><span class="t-num" id="mins">00</span><span class="t-label">Min</span></div>
        <div><span class="t-num" id="secs">00</span><span class="t-label">Sec</span></div>
    </div>

    <div id="connect-wrapper">
        <button id="btn-connect" class="btn">Connect Wallet</button>
    </div>

    <div id="buy-wrapper" class="trade-container">
        <label style="font-size:0.7rem; color:#8b949e; font-weight:600;">PAYMENT (ETH)</label>
        <input type="number" id="input-eth" placeholder="0.00" step="0.01">
        <p id="calc-ayb" style="font-size:0.85rem; color:var(--primary); margin: 15px 0 10px 0; font-weight:bold;">ESTIMATED: 0 AYB</p>
        <button id="btn-buy" class="btn">Confirm Purchase</button>
    </div>

    <div id="status-display"></div>
</div>

<script>
    // --- LIVE COUNTDOWN ENGINE ---
    // Targets 30 days from now (April 21, 2026)
    const TARGET = new Date("April 21, 2026 23:59:59").getTime();

    function updateTimer() {
        const now = new Date().getTime();
        const gap = TARGET - now;

        if (gap > 0) {
            document.getElementById('days').innerText = Math.floor(gap / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = String(Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60))).padStart(2, '0');
            document.getElementById('mins').innerText = String(Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60))).padStart(2, '0');
            document.getElementById('secs').innerText = String(Math.floor((gap % (1000 * 60)) / 1000)).padStart(2, '0');
        }
    }
    setInterval(updateTimer, 1000);
    updateTimer();

    // --- UNIVERSAL WALLET CORE ---
    const CONTRACT = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const ABI = ["function buyTokens() external payable"];
    const NETWORK = "0xa4b1"; 

    const connBtn = document.getElementById('btn-connect');
    const statusBox = document.getElementById('status-display');
    let walletSigner;

    function notify(txt, isErr) {
        statusBox.innerText = txt;
        statusBox.style.display = 'block';
        statusBox.style.color = isErr ? '#ff7b72' : '#00ffa3';
        statusBox.style.borderColor = isErr ? '#ff7b72' : '#00ffa3';
    }

    document.getElementById('input-eth').oninput = (e) => {
        document.getElementById('calc-ayb').innerText = `ESTIMATED: ${e.target.value * 100} AYB`;
    };

    connBtn.onclick = async () => {
        // Multi-wallet detection logic
        const provider = window.ethereum || (window.trustwallet ? window.trustwallet : null);

        if (!provider) {
            notify("No Wallet Detected. Opening MetaMask...", true);
            setTimeout(() => { window.location.href = "https://metamask.app.link/dapp/" + window.location.host; }, 1500);
            return;
        }

        try {
            notify("Connecting to Secure Node...", false);
            
            // Force authorization popup
            await provider.request({ method: 'wallet_requestPermissions', params: [{ eth_accounts: {} }] });
            await provider.request({ method: 'eth_requestAccounts' });

            // Ensure Arbitrum One Chain
            const chainId = await provider.request({ method: 'eth_chainId' });
            if (chainId !== NETWORK) {
                await provider.request({ method: 'wallet_switchEthereumChain', params: [{ chainId: NETWORK }] });
            }

            const ethersProv = new ethers.BrowserProvider(provider);
            walletSigner = await ethersProv.getSigner();

            document.getElementById('connect-wrapper').style.display = 'none';
            document.getElementById('buy-wrapper').style.display = 'block';
            notify("Terminal Authorized", false);

        } catch (e) { notify(e.message, true); }
    };

    document.getElementById('btn-buy').onclick = async () => {
        try {
            const val = document.getElementById('input-eth').value;
            if(!val || val <= 0) return notify("Enter a valid amount", true);
            
            const contract = new ethers.Contract(CONTRACT, ABI, walletSigner);
            notify("Check Wallet for Confirmation...", false);
            
            const tx = await contract.buyTokens({ value: ethers.parseEther(val) });
            notify("Processing Transaction...", false);
            await tx.wait();
            notify("Purchase Successful!", false);
        } catch (e) { notify(e.reason || "Transaction Denied", true); }
    };
</script>
</body>
</html>
