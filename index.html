<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Official Pre-sale</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        /* Background Tech Notice */
        .tech-notice { position: fixed; top: 20px; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 0.65rem; letter-spacing: 2px; text-transform: uppercase; pointer-events: none; z-index: 1; }

        .card { background: var(--card); border: 1px solid #30363d; padding: 2.5rem; border-radius: 30px; width: 90%; max-width: 420px; text-align: center; border-top: 4px solid var(--primary); position: relative; z-index: 2; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.6rem; margin-bottom: 5px; letter-spacing: 3px; }
        .sub-tag { color: #8b949e; font-size: 0.7rem; margin-bottom: 25px; display: block; letter-spacing: 1px; }

        /* Timer Grid */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 30px; }
        .timer-box { background: #010409; border: 1px solid #30363d; padding: 12px 5px; border-radius: 12px; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; }
        .timer-label { font-size: 0.55rem; color: #8b949e; text-transform: uppercase; margin-top: 4px; display: block; }

        /* Buttons */
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.95rem; transition: 0.3s; letter-spacing: 1px; }
        .btn:hover { box-shadow: 0 0 25px rgba(0,255,163,0.4); transform: translateY(-2px); }

        /* Wallet Modal */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(6px); }
        .modal-content { background: var(--modal); border: 1px solid #30363d; border-radius: 24px; width: 90%; max-width: 380px; padding: 24px; position: relative; }
        .modal-close { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #8b949e; font-size: 1.5rem; }
        .wallet-list { margin-top: 20px; }
        .wallet-row { display: flex; align-items: center; padding: 14px; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 10px; cursor: pointer; background: #21262d; transition: 0.2s; }
        .wallet-row:hover { border-color: var(--primary); background: #2d333b; }
        .wallet-row img { width: 30px; height: 30px; margin-right: 15px; border-radius: 6px; }
        .wallet-row span { font-weight: 600; flex-grow: 1; font-size: 0.95rem; }
        .tag { font-size: 0.6rem; color: #8b949e; background: #0d1117; padding: 4px 8px; border-radius: 6px; }

        /* Purchase Interface */
        .buy-interface { display: none; background: #010409; padding: 20px; border-radius: 18px; text-align: left; margin-top: 20px; border-left: 4px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="tech-notice">Technical Display Only - Arbitrum Network Simulation</div>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <span class="sub-tag">DECENTRALIZED NODE ACCESS</span>

    <div class="timer-grid">
        <div class="timer-box"><span class="timer-val" id="d">90</span><span class="timer-label">Days</span></div>
        <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Min</span></div>
        <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="auth-box">
        <button id="connect-trigger" class="btn">Connect Terminal</button>
    </div>

    <div id="swap-box" class="buy-interface">
        <label style="font-size: 0.6rem; color: #8b949e; font-weight: 800; letter-spacing: 1px;">PAYMENT (ETH)</label>
        <input type="number" placeholder="0.0" id="eth-amt">
        <button class="btn" style="margin-top: 15px;">Execute Swap</button>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <span class="modal-close" id="close-x">&times;</span>
        <div style="font-size: 0.85rem; color: #8b949e; font-weight: 600;">Connect a Wallet</div>
        
        <div class="wallet-list">
            <div class="wallet-row" onclick="startConnection()">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Logo.svg">
                <span>MetaMask</span>
                <span class="tag">Installed</span>
            </div>
            <div class="wallet-row" onclick="startConnection()">
                <img src="https://avatars.githubusercontent.com/u/18060234?s=280&v=4">
                <span>Coinbase</span>
                <span class="tag">Popular</span>
            </div>
            <div class="wallet-row" onclick="startConnection()">
                <img src="https://rabby.io/assets/logo.png">
                <span>Rabby Wallet</span>
                <span class="tag">Desktop</span>
            </div>
        </div>
    </div>
</div>

<script>
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('connect-trigger').onclick = () => overlay.style.display = 'flex';
    document.getElementById('close-x').onclick = () => overlay.style.display = 'none';

    // 1. Force Wake Protocol (Fixes Laptop Freeze)
    async function startConnection() {
        if (window.ethereum) {
            try {
                // Special request to force UI popup on desktop
                await window.ethereum.request({ 
                    method: "wallet_requestPermissions", 
                    params: [{ eth_accounts: {} }] 
                });
                overlay.style.display = 'none';
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('swap-box').style.display = 'block';
            } catch (err) {
                console.log("User cancelled connection");
            }
        } else {
            // Mobile Deep Link
            const cleanUrl = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${cleanUrl}`;
        }
    }

    // 2. Real-time 90 Day Countdown
    const endGoal = new Date();
    endGoal.setDate(endGoal.getDate() + 90);

    function runTimer() {
        const now = new Date().getTime();
        const gap = endGoal - now;

        document.getElementById('d').innerText = Math.floor(gap / (1000 * 60 * 60 * 24));
        document.getElementById('h').innerText = Math.floor((gap % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('m').innerText = Math.floor((gap % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById('s').innerText = Math.floor((gap % (1000 * 60)) / 1000);
    }
    setInterval(runTimer, 1000);
</script>
</body>
</html>
