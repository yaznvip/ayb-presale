<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Phase 2</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@6.7.0/dist/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffa3; --bg: #0d1117; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: #161b22; border: 1px solid #30363d; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 380px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; margin: 0; }
        .timer { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; padding: 15px; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid #30363d; }
        .t-val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--primary); font-family: 'Orbitron'; }
        .t-unit { font-size: 0.65rem; color: #8b949e; text-transform: uppercase; }
        .input-group { background: #010409; border: 1px solid #30363d; padding: 12px; border-radius: 10px; margin: 20px 0; text-align: left; }
        input { background: transparent; border: none; color: white; font-size: 1.2rem; width: 100%; outline: none; font-weight: bold; }
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn:hover { box-shadow: 0 0 20px rgba(0,255,163,0.4); }
        #status { margin-top: 15px; font-size: 0.8rem; padding: 10px; border-radius: 8px; display: none; border: 1px solid transparent; word-break: break-all; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <p style="color:#8b949e; font-size:0.85rem; margin-top:10px;">Phase 2 Closing In:</p>
    
    <div class="timer">
        <div><span class="t-val" id="d">00</span><span class="t-unit">Days</span></div>
        <div><span class="t-val" id="h">00</span><span class="t-unit">Hrs</span></div>
        <div><span class="t-val" id="m">00</span><span class="t-unit">Min</span></div>
        <div><span class="t-val" id="s">00</span><span class="t-unit">Sec</span></div>
    </div>

    <div id="c-area"><button id="c-btn" class="btn">CONNECT WALLET</button></div>

    <div id="b-area" style="display:none">
        <div class="input-group">
            <label style="font-size:0.7rem; color:#8b949e;">Amount (ETH)</label>
            <input type="number" id="amt" placeholder="0.0" step="0.01">
        </div>
        <p id="res" style="font-size:0.8rem; color:#8b949e; margin-bottom:15px">You receive: 0 AYB</p>
        <button id="buy" class="btn">BUY TOKENS</button>
    </div>
    <div id="status"></div>
</div>

<script>
    const ADDR = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const ABI = ["function buyTokens() external payable"];
    const NET_ID = "0xa4b1"; // Arbitrum One
    const TARGET = new Date("March 30, 2026 23:59:59").getTime();
    const DAPP_URL = "yaznvip.github.io/ayb-presale/"; // Your Live URL

    // Timer Logic
    setInterval(() => {
        const now = new Date().getTime();
        const d = TARGET - now;
        if(d > 0) {
            document.getElementById('d').innerText = Math.floor(d/86400000);
            document.getElementById('h').innerText = Math.floor((d%86400000)/3600000);
            document.getElementById('m').innerText = Math.floor((d%3600000)/60000);
            document.getElementById('s').innerText = Math.floor((d%60000)/1000);
        }
    }, 1000);

    const sDiv = document.getElementById('status');
    function log(m, isErr) { 
        sDiv.innerText = m; 
        sDiv.style.display = 'block'; 
        sDiv.style.borderColor = isErr ? '#f85149' : '#00ffa3'; 
        sDiv.style.color = isErr ? '#f85149' : '#00ffa3'; 
    }

    document.getElementById('amt').oninput = (e) => { 
        document.getElementById('res').innerText = You receive: ${e.target.value * 100} AYB; 
    };

    document.getElementById('c-btn').onclick = async () => {
        const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);

        // Logic for Mobile Chrome (Deep Link)
        if (isMobile && !window.ethereum) {
            window.location.href = https://metamask.app.link/dapp/${DAPP_URL};
            return;
        }

        if (window.ethereum) {
            try {
                // Request Account
                const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                // Switch/Add Network (Arbitrum)
                try {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: NET_ID }],
                    });
                } catch (err) {
                    if (err.code === 4902) {
                        await window.ethereum.request({
                            method: 'wallet_addEthereumChain',
                            params: [{
                                chainId: NET_ID,
                                chainName: 'Arbitrum One',
                                nativeCurrency: { name: 'ETH', symbol: 'ETH', decimals: 18 },
                                rpcUrls: ['https://arb1.arbitrum.io/rpc'],
                                blockExplorerUrls: ['https://arbiscan.io']
                            }]
                        });
                    }
                }

                document.getElementById('c-area').style.display = 'none';
                document.getElementById('b-area').style.display = 'block';
                log("Connected: " + accs[0].slice(0,6), false);
            } catch (e) {
                log(e.message, true);
            }
        } else {
            log("Please use MetaMask Browser or App", true);
        }
    };

    document.getElementById('buy').onclick = async () => {
        try {
            const v = document.getElementById('amt').value;
            if(!v || v <= 0) return log("Enter amount", true);
            
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(ADDR, ABI, signer);
            
            log("Check your wallet...", false);
            const tx = await contract.buyTokens({ value: ethers.parseEther(v) });
            log("Transaction Sent! Waiting...", false);
            await tx.wait();
            log("Purchase Successful!", false);
        } catch (e) {
            log(e.reason || "Transaction failed", true);
        }
    };
</script>
</body>
</html>
