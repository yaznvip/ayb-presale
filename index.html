<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Official Pre-sale</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        .side-notice { position: fixed; left: 20px; bottom: 20px; width: 260px; background: rgba(255,165,0,0.1); border-left: 4px solid orange; padding: 15px; font-size: 0.7rem; color: #ccc; text-align: left; line-height: 1.4; z-index: 100; border-radius: 0 8px 8px 0; }

        .card { background: var(--card); border: 1px solid #30363d; padding: 2.2rem; border-radius: 28px; width: 90%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); border-top: 4px solid var(--primary); text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; letter-spacing: 2px; }
        
        .progress-container { margin: 25px 0; text-align: left; }
        .progress-labels { display: flex; justify-content: space-between; font-size: 0.65rem; color: #8b949e; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .bar-bg { background: #30363d; height: 12px; border-radius: 6px; overflow: hidden; }
        .bar-fill { background: linear-gradient(90deg, #00ffa3, #00d187); height: 100%; width: 0%; transition: width 2s ease-in-out; }

        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { box-shadow: 0 0 30px rgba(0,255,163,0.5); transform: translateY(-2px); }
        
        .buy-interface { background: #010409; border: 1px solid #30363d; padding: 22px; border-radius: 18px; margin: 20px 0; text-align: left; display: none; }
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; font-weight: bold; margin-top: 5px; }
        #status-display { margin-top: 15px; font-size: 0.75rem; display: none; padding: 12px; border-radius: 10px; border: 1px solid; }
    </style>
</head>
<body>

<div class="side-notice">
    <strong>TECHNICAL DEMONSTRATION:</strong><br>
    Access is strictly restricted to whitelisted entities for technical validation. Unauthorized attempts will be rejected by the Smart Contract.
</div>

<div class="card">
    <h1>AYB TERMINAL</h1>

    <div class="progress-container">
        <div class="progress-labels">
            <span>Sold: <span id="sold-count">0</span> AYB</span>
            <span>Supply: 500K</span>
        </div>
        <div class="bar-bg"><div id="progress-bar" class="bar-fill"></div></div>
    </div>

    <div id="auth-area"><button id="connect-btn" class="btn">Connect Terminal</button></div>

    <div id="buy-area" class="buy-interface">
        <label style="font-size:0.65rem; color:#8b949e; font-weight:bold;">PAYMENT (ETH)</label>
        <input type="number" id="eth-input" placeholder="0.0" step="0.0001">
        <p id="ayb-output" style="font-size:0.85rem; color:var(--primary); margin: 15px 0 10px 0; font-weight:bold;">ESTIMATED: 0 AYB</p>
        <button id="confirm-buy" class="btn">Execute Swap</button>
    </div>
    <div id="status-display"></div>
</div>

<script>
    const SALE_CONTRACT = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const TOKEN_CONTRACT = "0x4b8D134A91405F8Dd3bc679F5B2b0B9283Cb7e15";
    const TOTAL_SUPPLY = 500000;
    const RPC_URL = "https://arb1.arbitrum.io/rpc"; 

    async function syncChainData() {
        try {
            const provider = new ethers.JsonRpcProvider(RPC_URL);
            const tokenAbi = ["function balanceOf(address) view returns (uint256)"];
            const contract = new ethers.Contract(TOKEN_CONTRACT, tokenAbi, provider);
            const balanceWei = await contract.balanceOf(SALE_CONTRACT);
            const remaining = Number(ethers.formatEther(balanceWei));
            const sold = Math.max(0, TOTAL_SUPPLY - remaining);
            document.getElementById("sold-count").innerText = Math.floor(sold).toLocaleString();
            document.getElementById("progress-bar").style.width = (sold / TOTAL_SUPPLY * 100) + "%";
        } catch (e) { console.error("Sync error"); }
    }
    syncChainData();

    document.getElementById("connect-btn").onclick = async () => {
        if (window.ethereum) {
            try {
                await window.ethereum.request({ method: "eth_requestAccounts" });
                document.getElementById("auth-area").style.display = "none";
                document.getElementById("buy-area").style.display = "block";
            } catch (e) { alert("Connection failed: Please unlock MetaMask"); }
        } else {
            const dappUrl = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${dappUrl}`;
        }
    };

    document.getElementById("eth-input").oninput = (e) => {
        const val = e.target.value || 0;
        document.getElementById("ayb-output").innerText = `ESTIMATED: ${Math.floor((val * 2500) / 0.1).toLocaleString()} AYB`;
    };
</script>
</body>
</html>
