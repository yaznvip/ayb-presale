<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB Token Presale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #00ffa3; --bg-dark: #0a0b0d; --card-bg: rgba(23, 28, 36, 0.95); }
        body { background-color: var(--bg-dark); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .presale-card { background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); padding: 2rem; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary-color); font-size: 1.5rem; margin-bottom: 1rem; }
        .input-box { background: rgba(0,0,0,0.2); border: 1px solid #333; padding: 1rem; border-radius: 12px; margin: 1.5rem 0; text-align: left; }
        label { font-size: 0.7rem; color: #888; text-transform: uppercase; }
        input { background: transparent; border: none; color: white; font-size: 1.2rem; width: 100%; outline: none; margin-top: 5px; }
        .info-row { display: flex; justify-content: space-between; font-size: 0.8rem; color: #ccc; margin-bottom: 1rem; }
        .main-btn { background: var(--primary-color); color: black; border: none; padding: 1rem; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .main-btn:hover { opacity: 0.9; transform: scale(0.98); }
        #status-msg { margin-top: 1rem; font-size: 0.8rem; padding: 8px; border-radius: 5px; display: none; }
        .err { color: #ff4d4d; border: 1px solid #ff4d4d; }
        .ok { color: var(--primary-color); border: 1px solid var(--primary-color); }
    </style>
</head>
<body>

<div class="presale-card">
    <h1>AYB TERMINAL</h1>
    <p style="color: #888; font-size: 0.9rem;">Whitelisted Investors Only</p>

    <div id="connect-section">
        <button id="connect-wallet" class="main-btn">CONNECT WALLET</button>
    </div>

    <div id="buy-section" style="display: none;">
        <div class="input-box">
            <label>Investment Amount (ETH)</label>
            <input type="number" id="eth-input" placeholder="0.00" step="0.01">
        </div>
        <div class="info-row">
            <span>Price: 0.01 ETH</span>
            <span id="token-calc">You receive: 0 AYB</span>
        </div>
        <button id="buy-btn" class="main-btn">PURCHASE NOW</button>
    </div>

    <div id="status-msg"></div>
</div>

<script>
    const CONTRACT_ADDR = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const ABI = ["function buyTokens() external payable"];
    const ARBITRUM_CHAIN_ID = "0xa4b1";

    const connectBtn = document.getElementById('connect-wallet');
    const buySection = document.getElementById('buy-section');
    const connectSection = document.getElementById('connect-section');
    const ethInput = document.getElementById('eth-input');
    const statusMsg = document.getElementById('status-msg');

    function updateStatus(text, isError) {
        statusMsg.innerText = text;
        statusMsg.className = isError ? 'err' : 'ok';
        statusMsg.style.display = 'block';
    }

    ethInput.oninput = () => {
        const val = ethInput.value || 0;
        document.getElementById('token-calc').innerText = You receive: ${val * 100} AYB;
    };

    connectBtn.onclick = async () => {
        if (window.ethereum) {
            try {
                // Force popup to show in Chrome
                await window.ethereum.request({ method: 'wallet_requestPermissions', params: [{ eth_accounts: {} }] });
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                
                const chainId = await window.ethereum.request({ method: 'eth_chainId' });
                if (chainId !== ARBITRUM_CHAIN_ID) {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: ARBITRUM_CHAIN_ID }],
                    });
                }

                connectSection.style.display = 'none';
                buySection.style.display = 'block';
                updateStatus("Wallet Connected", false);
            } catch (err) {
                updateStatus("Connection failed: " + err.message, true);
            }
        } else {
            // Deep link for mobile Chrome users
            const link = "https://metamask.app.link/dapp/" + window.location.href.split('://')[1];
            window.location.href = link;
        }
    };

    document.getElementById('buy-btn').onclick = async () => {
        try {
            const amount = ethInput.value;
            if (!amount || amount <= 0) return updateStatus("Enter valid amount", true);

            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CONTRACT_ADDR, ABI, signer);

            updateStatus("Please confirm in MetaMask...", false);
            const tx = await contract.buyTokens({ value: ethers.parseEther(amount) });
            await tx.wait();
            updateStatus("Purchase successful!", false);
        } catch (err) {
            updateStatus("Error: " + (err.reason || err.message), true);
        }
    };
</script>

</body>
</html>
