<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | LIVE</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid #30363d; padding: 2.2rem; border-radius: 25px; width: 90%; max-width: 400px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.4rem; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-t { font-size: 0.6rem; color: #8b949e; letter-spacing: 1px; margin-bottom: 20px; display: block; }

        /* Progress Bar for 500k Limit */
        .progress-container { background: #010409; border-radius: 10px; height: 10px; margin: 15px 0; border: 1px solid #30363d; overflow: hidden; }
        .progress-bar { background: var(--primary); width: 65%; height: 100%; box-shadow: 0 0 10px var(--primary); transition: 1s; }
        .cap-info { display: flex; justify-content: space-between; font-size: 0.65rem; color: #8b949e; font-weight: bold; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; }
        .timer-box { background: #010409; padding: 12px 2px; border-radius: 12px; border: 1px solid #30363d; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; }
        .timer-label { font-size: 0.55rem; color: #8b949e; text-transform: uppercase; }

        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.3s; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(10px); }
        .modal-content { background: var(--modal); border: 1px solid #30363d; border-radius: 25px; width: 90%; max-width: 350px; padding: 30px; text-align: left; }
        
        .wallet-row { display: flex; align-items: center; padding: 16px; border-radius: 15px; border: 1px solid #30363d; margin-top: 12px; cursor: pointer; background: #21262d; transition: 0.2s; }
        .wallet-row:hover { border-color: var(--primary); background: #2d333b; }
        .icon-geo { width: 35px; height: 35px; border-radius: 8px; margin-right: 15px; }

        .swap-box { display: none; background: #010409; padding: 25px; border-radius: 20px; text-align: left; margin-top: 20px; border-left: 5px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.8rem; width: 100%; outline: none; font-weight: bold; margin-top: 8px; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <span class="sub-t">SECURE PRE-SALE PROTOCOL</span>

    <div class="cap-info">
        <span>Allocation Sold</span>
        <span>72%</span>
    </div>
    <div class="progress-container">
        <div class="progress-bar"></div>
    </div>
    <div class="cap-info" style="margin-top: -10px; margin-bottom: 10px;">
        <span style="color: var(--primary);">Total Cap: 500,000 AYB</span>
    </div>

    <div class="timer-grid">
        <div class="timer-box"><span class="timer-val" id="d">90</span><span class="timer-label">Days</span></div>
        <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Min</span></div>
        <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="init-ui">
        <button onclick="openWallets()" class="btn">Access Terminal</button>
    </div>

    <div id="trade-ui" class="swap-box">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <label style="font-size: 0.65rem; color: #8b949e; font-weight: bold;">PAY (ETH)</label>
            <span id="user-wallet-bal" style="font-size: 0.75rem; color: var(--primary); font-weight: bold;">0.00000</span>
        </div>
        <input type="number" id="input-eth" placeholder="0.0" oninput="updateAyb()">
        
        <label style="font-size: 0.65rem; color: #8b949e; margin-top: 20px; display: block; font-weight: bold;">RECEIVE (AYB)</label>
        <span id="output-ayb" style="color: var(--primary); font-family: 'Orbitron'; font-size: 1.5rem; display: block; margin-top: 5px;">0.00</span>
        
        <button id="main-buy-btn" class="btn" style="margin-top: 25px;" onclick="processBuy()" disabled>Execute Contract</button>
        <div id="tx-log" style="font-size: 0.6rem; margin-top: 15px; text-align: center; font-weight: bold;"></div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <div style="font-size: 0.9rem; font-weight: bold; margin-bottom: 20px; color: #8b949e;">Select Gateway</div>
        <div class="wallet-row" onclick="startConnect()">
            <div class="icon-geo" style="background: linear-gradient(45deg, #f6851b, #ffcc80);"></div>
            <span style="font-weight: bold;">MetaMask</span>
        </div>
        <div class="wallet-row" onclick="startConnect()">
            <div class="icon-geo" style="background: linear-gradient(45deg, #3375bb, #80b3ff);"></div>
            <span style="font-weight: bold;">Trust Wallet</span>
        </div>
        <div style="text-align:center; margin-top:25px; color:#8b949e; cursor:pointer; font-size: 0.8rem;" onclick="closeWallets()">Back to Terminal</div>
    </div>
</div>

<script>
    let ethPriceRaw = 3500;
    const ARB_NODE = "https://arb1.arbitrum.io/rpc"; 

    function openWallets() { document.getElementById('modal-overlay').style.display = 'flex'; }
    function closeWallets() { document.getElementById('modal-overlay').style.display = 'none'; }

    async function startConnect() {
        if (!window.ethereum) {
            window.location.href = `https://metamask.app.link/dapp/${window.location.href.replace(/https?:\/\//, '')}`;
            return;
        }
        try {
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            const provider = new ethers.JsonRpcProvider(ARB_NODE);
            const balance = await provider.getBalance(accs[0]);
            
            document.getElementById('user-wallet-bal').innerText = `${parseFloat(ethers.formatEther(balance)).toFixed(5)} ETH`;
            document.getElementById('init-ui').style.display = 'none';
            document.getElementById('trade-ui').style.display = 'block';
            closeWallets();
        } catch (err) { alert("Switch to Arbitrum Network"); }
    }

    function updateAyb() {
        const ethVal = document.getElementById('input-eth').value;
        const aybOut = document.getElementById('output-ayb');
        const buyBtn = document.getElementById('main-buy-btn');
        if(ethVal > 0) {
            const calculated = Math.floor((ethVal * ethPriceRaw) / 0.1);
            aybOut.innerText = calculated.toLocaleString();
            // Check against 500k limit
            buyBtn.disabled = calculated > 500000;
        } else {
            aybOut.innerText = "0.00";
            buyBtn.disabled = true;
        }
    }

    async function processBuy() {
        const amt = document.getElementById('input-eth').value;
        const log = document.getElementById('tx-log');
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const tx = await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47",
                value: ethers.parseEther(amt)
            });
            log.innerText = "TX SUCCESS: " + tx.hash.substring(0,16) + "...";
            log.style.color = "#00ffa3";
        } catch (e) {
            log.innerText = "TX REJECTED: Insufficient Funds/Gas";
            log.style.color = "#ff4a4a";
        }
    }

    fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
        .then(r => r.json()).then(d => ethPriceRaw = parseFloat(d.price));

    const endTs = new Date(); endTs.setDate(endTs.getDate() + 90);
    setInterval(() => {
        const dff = endTs - new Date();
        document.getElementById('d').innerText = Math.floor(dff / 864e5);
        document.getElementById('h').innerText = Math.floor((dff % 864e5) / 36e5);
        document.getElementById('m').innerText = Math.floor((dff % 36e5) / 6e4);
        document.getElementById('s').innerText = Math.floor((dff % 6e4) / 1000);
    }, 1000);
</script>
</body>
</html>
