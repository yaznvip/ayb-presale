<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB Presale | Phase 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); border: 1px solid #30363d; padding: 2rem; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.4rem; margin-bottom: 5px; }
        .timer { display: flex; justify-content: center; gap: 10px; margin: 15px 0; padding: 10px; background: rgba(0,255,163,0.05); border-radius: 10px; border: 1px dashed var(--primary); }
        .timer-unit { font-size: 0.8rem; color: #8b949e; }
        .timer-val { display: block; font-size: 1.2rem; font-weight: bold; color: var(--primary); font-family: 'Orbitron'; }
        .input-group { background: #0d1117; border: 1px solid #30363d; padding: 12px; border-radius: 10px; margin: 20px 0; text-align: left; }
        label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; }
        input { background: transparent; border: none; color: white; font-size: 1.3rem; width: 100%; outline: none; margin-top: 5px; font-weight: bold; }
        .btn { background: var(--primary); color: black; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn:hover { opacity: 0.9; transform: translateY(-2px); }
        #status { margin-top: 15px; font-size: 0.8rem; display: none; padding: 10px; border-radius: 5px; }
        .err { border: 1px solid #f85149; color: #f85149; }
        .ok { border: 1px solid var(--primary); color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h1>AYB TERMINAL</h1>
    <p style="color:#8b949e; font-size:0.8rem">Phase 2 Ends In:</p>
    
    <div class="timer">
        <div><span class="timer-val" id="days">00</span><span class="timer-unit">Days</span></div>
        <div><span class="timer-val" id="hours">00</span><span class="timer-unit">Hours</span></div>
        <div><span class="timer-val" id="mins">00</span><span class="timer-unit">Mins</span></div>
        <div><span class="timer-val" id="secs">00</span><span class="timer-unit">Secs</span></div>
    </div>

    <div id="connectSection">
        <button id="connectBtn" class="btn">CONNECT WALLET</button>
    </div>

    <div id="buySection" style="display:none">
        <div class="input-group">
            <label>Investment (ETH)</label>
            <input type="number" id="ethAmount" placeholder="0.00" step="0.01">
        </div>
        <p id="calc" style="font-size:0.8rem; color:#8b949e; margin-bottom:15px">You get: 0 AYB</p>
        <button id="buyBtn" class="btn">BUY TOKENS</button>
    </div>

    <div id="status"></div>
</div>

<script>
    // --- SETTINGS ---
    const CONTRACT = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const ABI = ["function buyTokens() external payable"];
    const CHAIN_ID = "0xa4b1"; // Arbitrum
    const END_DATE = new Date("March 30, 2026 23:59:59").getTime();

    // --- TIMER LOGIC ---
    setInterval(() => {
        const now = new Date().getTime();
        const diff = END_DATE - now;
        if (diff > 0) {
            document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
            document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            document.getElementById('mins').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            document.getElementById('secs').innerText = Math.floor((diff % (1000 * 60)) / 1000);
        }
    }, 1000);

    // --- WALLET LOGIC ---
    const btn = document.getElementById('connectBtn');
    const status = document.getElementById('status');

    function showMsg(m, isErr) {
        status.innerText = m;
        status.className = isErr ? 'err' : 'ok';
        status.style.display = 'block';
    }

    document.getElementById('ethAmount').oninput = (e) => {
        document.getElementById('calc').innerText = You get: ${e.target.value * 100} AYB;
    };

    btn.onclick = async () => {
        if (window.ethereum) {
            try {
                // FORCE REFRESH CONNECTION
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                const chain = await window.ethereum.request({ method: 'eth_chainId' });
                
                if (chain !== CHAIN_ID) {
                    await window.ethereum.request({
                        method: 'wallet_switchEthereumChain',
                        params: [{ chainId: CHAIN_ID }]
                    });
                }
                document.getElementById('connectSection').style.display = 'none';
                document.getElementById('buySection').style.display = 'block';
                showMsg("Connected!", false);
            } catch (e) {
                showMsg(e.message, true);
            }
        } else {
            // MOBILE REDIRECT
            window.location.href = "https://metamask.app.link/dapp/yaznvip.github.io/ayb-presale/";
        }
    };

    document.getElementById('buyBtn').onclick = async () => {
        try {
            const val = document.getElementById('ethAmount').value;
            if (!val || val <= 0) return showMsg("Enter valid amount", true);
            
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CONTRACT, ABI, signer);
            
            showMsg("Confirm in wallet...", false);
            const tx = await contract.buyTokens({ value: ethers.parseEther(val) });
            await tx.wait();
            showMsg("Success!", false);
        } catch (e) {
            showMsg(e.reason || e.message, true);
        }
    };
</script>
</body>
</html>
