<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Professional Presale</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        
        .demo-notice { position: fixed; top: 15px; width: 100%; text-align: center; color: rgba(255,255,255,0.2); font-size: 0.6rem; letter-spacing: 2px; text-transform: uppercase; z-index: 10; pointer-events: none; }

        .card { background: var(--card); border: 1px solid #30363d; padding: 2.5rem; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; letter-spacing: 3px; margin-bottom: 5px; }
        .sub-text { color: #8b949e; font-size: 0.65rem; margin-bottom: 25px; display: block; letter-spacing: 1px; }

        /* Timer UI */
        .timer-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 30px; }
        .timer-unit { background: #010409; border: 1px solid #30363d; padding: 12px 2px; border-radius: 12px; }
        .timer-num { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; }
        .timer-label { font-size: 0.5rem; color: #8b949e; text-transform: uppercase; margin-top: 4px; display: block; }

        /* Main Buttons */
        .primary-btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.95rem; transition: 0.3s; letter-spacing: 1px; }
        .primary-btn:hover { box-shadow: 0 0 25px rgba(0,255,163,0.5); transform: translateY(-2px); }

        /* Wallet Selection Modal */
        #wallet-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-box { background: var(--modal); border: 1px solid #30363d; border-radius: 26px; width: 92%; max-width: 380px; padding: 25px; position: relative; }
        .close-icon { position: absolute; top: 15px; right: 20px; cursor: pointer; color: #8b949e; font-size: 1.6rem; }
        
        .wallet-option { display: flex; align-items: center; padding: 15px; border-radius: 14px; border: 1px solid #30363d; margin-top: 12px; cursor: pointer; background: #21262d; transition: 0.2s; }
        .wallet-option:hover { border-color: var(--primary); background: #2d333b; }
        .wallet-option img { width: 32px; height: 32px; margin-right: 15px; border-radius: 6px; }
        .wallet-option span { font-weight: 600; flex-grow: 1; font-size: 1rem; text-align: left; }
        .status-pill { font-size: 0.6rem; color: #8b949e; background: #0d1117; padding: 4px 8px; border-radius: 6px; }

        /* Post-Connection Interface */
        #purchase-ui { display: none; background: #010409; padding: 20px; border-radius: 18px; text-align: left; margin-top: 20px; border-left: 4px solid var(--primary); }
        .input-group label { font-size: 0.6rem; color: #8b949e; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; }
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; margin-top: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div class="demo-notice">Technical Presentation Layer - Simulation Only</div>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <span class="sub-text">DECENTRALIZED NETWORK ACCESS</span>

    <div class="timer-container">
        <div class="timer-unit"><span class="timer-num" id="days">90</span><span class="timer-label">Days</span></div>
        <div class="timer-unit"><span class="timer-num" id="hours">00</span><span class="timer-label">Hours</span></div>
        <div class="timer-unit"><span class="timer-num" id="mins">00</span><span class="timer-label">Mins</span></div>
        <div class="timer-unit"><span class="timer-num" id="secs">00</span><span class="timer-label">Secs</span></div>
    </div>

    <div id="connect-section">
        <button id="open-modal-btn" class="primary-btn">Connect Wallet</button>
    </div>

    <div id="purchase-ui">
        <div class="input-group">
            <label>Amount to Send (ETH)</label>
            <input type="number" placeholder="0.0" id="eth-input">
        </div>
        <button class="primary-btn" style="margin-top: 15px;">Confirm Access</button>
    </div>
</div>

<div id="wallet-modal">
    <div class="modal-box">
        <span class="close-icon" id="close-modal-btn">&times;</span>
        <div style="font-size: 0.9rem; color: #8b949e; font-weight: 600; text-align: left; margin-bottom: 10px;">Connect a Wallet</div>
        
        <div class="wallet-option" onclick="connectProcess()">
            <img src="https://raw.githubusercontent.com/MetaMask/brand-resources/master/SVG/metamask-fox.svg">
            <span>MetaMask</span>
            <span class="status-pill">Installed</span>
        </div>
        <div class="wallet-option" onclick="connectProcess()">
            <img src="https://avatars.githubusercontent.com/u/18060234?s=280&v=4">
            <span>Coinbase</span>
            <span class="status-pill">Popular</span>
        </div>
        <div class="wallet-option" onclick="connectProcess()">
            <img src="https://rabby.io/assets/logo.png">
            <span>Rabby Wallet</span>
            <span class="status-pill">Desktop</span>
        </div>
    </div>
</div>

<script>
    const modal = document.getElementById('wallet-modal');
    document.getElementById('open-modal-btn').onclick = () => { modal.style.display = 'flex'; };
    document.getElementById('close-modal-btn').onclick = () => { modal.style.display = 'none'; };

    // Connection Handler with Fix for Laptop Freeze
    async function connectProcess() {
        if (window.ethereum) {
            try {
                // Fix for Laptop: Using RequestPermissions forces the popup window to show immediately
                await window.ethereum.request({ 
                    method: "wallet_requestPermissions", 
                    params: [{ eth_accounts: {} }] 
                });
                
                modal.style.display = 'none';
                document.getElementById('connect-section').style.display = 'none';
                document.getElementById('purchase-ui').style.display = 'block';
            } catch (err) {
                console.warn("User cancelled or wallet locked");
            }
        } else {
            // Mobile Fallback: Redirect to MetaMask Browser
            const targetUrl = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${targetUrl}`;
        }
    }

    // Live 90-Day Countdown Engine
    const releaseDate = new Date();
    releaseDate.setDate(releaseDate.getDate() + 90);

    function startTimer() {
        const now = new Date().getTime();
        const distance = releaseDate - now;

        document.getElementById('days').innerText = Math.floor(distance / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('mins').innerText = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById('secs').innerText = Math.floor((distance % (1000 * 60)) / 1000);
    }
    setInterval(startTimer, 1000);
</script>
</body>
</html>
