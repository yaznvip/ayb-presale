<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | LIVE DATA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 2.2rem; border-radius: 30px; width: 90%; max-width: 400px; text-align: center; border-top: 4px solid var(--primary); }
        h1 { font-family: 'Orbitron'; color: var(--primary); font-size: 1.5rem; letter-spacing: 3px; }
        .bar-bg { background: #010409; border-radius: 12px; height: 12px; margin: 20px 0; border: 1px solid #30363d; overflow: hidden; }
        .bar-fill { background: var(--primary); width: 72.8%; height: 100%; box-shadow: 0 0 15px var(--primary); }
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
        .buy-interface { display: none; background: #010409; padding: 22px; border-radius: 18px; text-align: left; margin-top: 20px; border-left: 5px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; font-weight: bold; -webkit-appearance: none; margin: 10px 0; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #1c2128; border-radius: 26px; width: 90%; max-width: 340px; padding: 25px; border: 1px solid #30363d; }
        .w-opt { display: flex; align-items: center; padding: 15px; border-radius: 14px; border: 1px solid #30363d; margin-top: 12px; cursor: pointer; background: #21262d; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <div style="display:flex; justify-content:space-between; font-size:0.6rem; color:#8b949e; font-weight:800;">
        <span>Allocation Sold</span><span>500,000 AYB MAX</span>
    </div>
    <div class="bar-bg"><div class="bar-fill"></div></div>

    <div id="connect-section"><button onclick="openM()" class="btn">Connect Wallet</button></div>

    <div id="trade-section" class="buy-interface">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <label style="font-size:0.6rem; color:#8b949e; font-weight:800;">PAY (ETH)</label>
            <span id="real-bal" style="font-size: 0.75rem; color: var(--primary); font-weight: 800;">Loading...</span>
        </div>
        <input type="number" id="eth-in" placeholder="0.0" oninput="rev()">
        <label style="font-size:0.6rem; color:#8b949e; font-weight:800;">RECEIVE (AYB)</label>
        <span id="ayb-out" style="color:var(--primary); font-family:'Orbitron'; font-size:1.4rem; display:block; margin-top:5px;">0</span>
        <button id="exec-btn" class="btn" style="margin-top:20px;" onclick="startTx()" disabled>Execute Contract</button>
        <div id="status" style="font-size:0.6rem; margin-top:12px; text-align:center; font-weight:800;"></div>
    </div>
</div>

<div id="modal"><div class="modal-box">
    <div class="w-opt" onclick="con()"><div style="width:30px;height:30px;background:#f6851b;border-radius:8px;margin-right:15px;"></div><span>MetaMask</span></div>
    <div class="w-opt" onclick="con()"><div style="width:30px;height:30px;background:#3375bb;border-radius:8px;margin-right:15px;"></div><span>Trust Wallet</span></div>
</div></div>

<script>
    let ethPrice = 3500;
    const ARB_RPC = "https://arb1.arbitrum.io/rpc";

    function openM() { document.getElementById('modal').style.display='flex'; }

    async function con() {
        if (!window.ethereum) return;
        try {
            // 1. Get real account
            const accs = await window.ethereum.request({ method: 'eth_requestAccounts' });
            // 2. Get real balance from Arbitrum
            const prov = new ethers.JsonRpcProvider(ARB_RPC);
            const balanceWei = await prov.getBalance(accs[0]);
            const balanceEth = ethers.formatEther(balanceWei);
            
            // 3. Update UI with REAL data
            document.getElementById('real-bal').innerText = parseFloat(balanceEth).toFixed(5) + " ETH";
            document.getElementById('connect-section').style.display='none';
            document.getElementById('trade-section').style.display='block';
            document.getElementById('modal').style.display='none';
        } catch (e) { alert("Please connect to Arbitrum Network"); }
    }

    function rev() {
        const val = document.getElementById('eth-in').value;
        const total = Math.floor((val * ethPrice) / 0.1);
        document.getElementById('ayb-out').innerText = total.toLocaleString();
        // Limit Check
        document.getElementById('exec-btn').disabled = (val <= 0 || total > 500000);
    }

    async function startTx() {
        const log = document.getElementById('status');
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47",
                value: ethers.parseEther(document.getElementById('eth-in').value)
            });
        } catch (e) {
            log.innerText = "TX FAILED: Check Gas/Balance on Arbitrum";
            log.style.color = "#ff4a4a";
        }
    }

    fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
        .then(r => r.json()).then(d => ethPrice = parseFloat(d.price));
</script>
</body>
</html>
