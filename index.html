<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Phase 2 Node</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; text-align: center; }
        .card { background: var(--card); border: 1px solid #30363d; padding: 2.5rem; border-radius: 24px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.6); position: relative; border-top: 4px solid var(--primary); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; margin-bottom: 5px; letter-spacing: 2px; }
        .subtitle { color: #8b949e; font-size: 0.75rem; margin-bottom: 20px; text-transform: uppercase; }
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 25px 0; padding: 15px; background: rgba(0,255,163,0.03); border-radius: 15px; border: 1px solid #30363d; }
        .t-num { display: block; font-size: 1.3rem; font-weight: bold; color: var(--primary); font-family: 'Orbitron'; }
        .t-lab { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; font-weight: 600; }
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s ease; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { box-shadow: 0 0 25px rgba(0,255,163,0.5); transform: translateY(-3px); }
        .buy-interface { background: #010409; border: 1px solid #30363d; padding: 20px; border-radius: 16px; margin: 20px 0; text-align: left; display: none; animation: slideIn 0.4s ease-out; }
        input { background: transparent; border: none; color: white; font-size: 1.5rem; width: 100%; outline: none; font-weight: bold; margin-top: 5px; }
        #status-display { margin-top: 15px; font-size: 0.8rem; display: none; padding: 10px; border-radius: 8px; border: 1px solid; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <p class="subtitle">Decentralized Node Access</p>
    
    <div class="timer-grid">
        <div><span class="t-num" id="d_box">00</span><span class="t-lab">Days</span></div>
        <div><span class="t-num" id="h_box">00</span><span class="t-lab">Hrs</span></div>
        <div><span class="t-num" id="m_box">00</span><span class="t-lab">Min</span></div>
        <div><span class="t-num" id="s_box">00</span><span class="t-lab">Sec</span></div>
    </div>

    <div id="auth-area">
        <button id="connect-btn" class="btn">Connect Wallet</button>
    </div>

    <div id="buy-area" class="buy-interface">
        <label style="font-size:0.7rem; color:#8b949e; font-weight:600;">PAYMENT (ETH)</label>
        <input type="number" id="eth-input" placeholder="0.00" step="0.0001">
        <p id="ayb-output" style="font-size:0.85rem; color:var(--primary); margin: 15px 0 10px 0; font-weight:bold;">YOU GET: 0 AYB</p>
        <button id="confirm-buy" class="btn">Purchase Now</button>
    </div>

    <div id="status-display"></div>
</div>

<script>
    const TARGET = new Date("April 21, 2026 23:59:59").getTime();
    function updateTimer() {
        const now = new Date().getTime();
        const gap = TARGET - now;
        if (gap > 0) {
            document.getElementById("d_box").innerText = Math.floor(gap / 86400000);
            document.getElementById("h_box").innerText = String(Math.floor((gap % 86400000) / 3600000)).padStart(2, "0");
            document.getElementById("m_box").innerText = String(Math.floor((gap % 3600000) / 60000)).padStart(2, "0");
            document.getElementById("s_box").innerText = String(Math.floor((gap % 60000) / 1000)).padStart(2, "0");
        }
    }
    setInterval(updateTimer, 1000);

    const ADDR = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const ABI = ["function buyTokens() external payable"];
    const CHAIN = "0xa4b1"; 

    const cBtn = document.getElementById("connect-btn");
    const sBox = document.getElementById("status-display");
    let signer;
    let ethPriceInUsd = 2500; // Default fallback price

    function notify(msg, err) {
        sBox.innerText = msg;
        sBox.style.display = "block";
        sBox.style.color = err ? "#ff7b72" : "#00ffa3";
        sBox.style.borderColor = err ? "#ff7b72" : "#00ffa3";
    }

    // --- FETCH REAL-TIME ETH PRICE ---
    async function getPrice() {
        try {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT');
            const data = await res.json();
            ethPriceInUsd = parseFloat(data.price);
        } catch (e) { console.log("Price fetch failed, using default"); }
    }
    getPrice();

    document.getElementById("eth-input").oninput = (e) => {
        const ethAmount = e.target.value;
        // Calculation: (ETH Amount * Current Price) / 0.1 USD per token
        const tokens = (ethAmount * ethPriceInUsd) / 0.1;
        document.getElementById("ayb-output").innerText = `YOU GET: ${Math.floor(tokens).toLocaleString()} AYB`;
    };

    async function connect() {
        if (!window.ethereum) {
            if (/Android|iPhone/i.test(navigator.userAgent)) {
                window.location.href = "https://metamask.app.link/dapp/yaznvip.github.io/ayb-presale/";
            } else {
                notify("MetaMask not detected!", true);
            }
            return;
        }

        try {
            notify("Syncing...", false);
            // Fix for laptop "no account" error: Force request
            const accounts = await window.ethereum.request({ method: "eth_requestAccounts" });
            
            const chainId = await window.ethereum.request({ method: "eth_chainId" });
            if (chainId !== CHAIN) {
                await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: CHAIN }] });
            }

            const provider = new ethers.BrowserProvider(window.ethereum);
            signer = await provider.getSigner();
            
            document.getElementById("auth-area").style.display = "none";
            document.getElementById("buy-area").style.display = "block";
            notify("Terminal Online", false);
        } catch (e) { notify("Please unlock MetaMask", true); }
    }

    cBtn.onclick = connect;

    document.getElementById("confirm-buy").onclick = async () => {
        try {
            const val = document.getElementById("eth-input").value;
            if(!val || val <= 0) return notify("Invalid amount", true);
            notify("Confirming...", false);
            const contract = new ethers.Contract(ADDR, ABI, signer);
            const tx = await contract.buyTokens({ value: ethers.parseEther(val) });
            await tx.wait();
            notify("Success!", false);
        } catch (e) { notify("Transaction Failed", true); }
    };
</script>
</body>
</html>
