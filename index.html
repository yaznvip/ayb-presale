<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Official Technical Demo</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Side Disclaimer for Technical Authority */
        .side-notice { position: fixed; left: 20px; bottom: 20px; width: 260px; background: rgba(255,165,0,0.1); border-left: 4px solid orange; padding: 15px; font-size: 0.7rem; color: #ccc; line-height: 1.4; z-index: 100; border-radius: 0 8px 8px 0; }

        .card { background: var(--card); border: 1px solid #30363d; padding: 2.5rem; border-radius: 30px; width: 90%; max-width: 400px; box-shadow: 0 25px 50px rgba(0,0,0,0.5); border-top: 4px solid var(--primary); text-align: center; }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.6rem; letter-spacing: 2px; margin-bottom: 10px; }
        
        /* Real-time Progress Bar */
        .stats-box { margin: 20px 0; text-align: left; }
        .stats-label { display: flex; justify-content: space-between; font-size: 0.7rem; color: #8b949e; margin-bottom: 8px; font-weight: bold; text-transform: uppercase; }
        .progress-bar { background: #30363d; height: 12px; border-radius: 6px; overflow: hidden; border: 1px solid #3e444d; }
        .progress-fill { background: linear-gradient(90deg, #00ffa3, #03ce83); height: 100%; width: 0%; transition: width 2s cubic-bezier(0.17, 0.67, 0.83, 0.67); }

        /* Unified Action Button */
        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 15px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { box-shadow: 0 0 30px rgba(0,255,163,0.4); transform: translateY(-2px); }
        
        /* Interactive Buy Interface */
        .buy-box { background: #010409; border: 1px solid #30363d; padding: 20px; border-radius: 20px; margin-top: 20px; display: none; text-align: left; }
        input { background: transparent; border: none; color: white; font-size: 1.8rem; width: 100%; outline: none; font-weight: bold; margin: 10px 0; }
        .status-msg { margin-top: 15px; font-size: 0.8rem; padding: 10px; border-radius: 10px; display: none; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<div class="side-notice">
    <strong>TECHNICAL DEMONSTRATION:</strong><br>
    This interface is a functional prototype for technical display. Direct participation is strictly restricted to whitelisted entities. Unauthorized attempts will be rejected by the Smart Contract.
</div>

<div class="card">
    <h1>AYB TERMINAL</h1>
    
    <div class="stats-box">
        <div class="stats-label">
            <span>Sold: <span id="sold-amount">0</span> AYB</span>
            <span>Supply: 500,000</span>
        </div>
        <div class="progress-bar"><div id="fill" class="progress-fill"></div></div>
    </div>

    <div id="connect-section">
        <button id="main-btn" class="btn">Connect Terminal</button>
    </div>

    <div id="buy-section" class="buy-box">
        <label style="font-size:0.7rem; color:#8b949e; font-weight: bold;">PAYMENT AMOUNT (ETH)</label>
        <input type="number" id="eth-amount" placeholder="0.0" step="0.01">
        <div id="est-tokens" style="color:var(--primary); font-size:0.9rem; font-weight:bold; margin-bottom:15px;">ESTIMATED: 0 AYB</div>
        <button id="buy-btn" class="btn">Execute Swap</button>
    </div>
    
    <div id="msg" class="status-msg"></div>
</div>

<script>
    const TOKEN_CONTRACT = "0x4b8D134A91405F8Dd3bc679F5B2b0B9283Cb7e15";
    const SALE_CONTRACT = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const TOTAL_SUPPLY = 500000;
    const ARB_RPC = "https://arb1.arbitrum.io/rpc";

    // 1. Fetch Real-Time On-Chain Data
    async function syncChain() {
        try {
            const provider = new ethers.JsonRpcProvider(ARB_RPC);
            const abi = ["function balanceOf(address) view returns (uint256)"];
            const contract = new ethers.Contract(TOKEN_CONTRACT, abi, provider);
            
            const balance = await contract.balanceOf(SALE_CONTRACT);
            const remaining = parseFloat(ethers.formatEther(balance));
            const sold = Math.max(0, TOTAL_SUPPLY - remaining);
            
            document.getElementById("sold-amount").innerText = Math.floor(sold).toLocaleString();
            document.getElementById("fill").style.width = (sold / TOTAL_SUPPLY * 100) + "%";
        } catch (e) { console.error("Chain Sync Error"); }
    }
    syncChain();

    // 2. Smart Wallet Connection Logic
    document.getElementById("main-btn").onclick = async () => {
        if (window.ethereum) {
            try {
                // PC and MetaMask In-App Browser support
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                setupUI();
            } catch (e) { alert("Connection Error: Please unlock MetaMask"); }
        } else {
            // Automatic Deep Linking for External Mobile Browsers (Chrome/Safari)
            const currentUrl = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${currentUrl}`;
        }
    };

    function setupUI() {
        document.getElementById("connect-section").style.display = "none";
        document.getElementById("buy-section").style.display = "block";
        const status = document.getElementById("msg");
        status.style.display = "block";
        status.style.color = "#00ffa3";
        status.innerText = "Terminal Securely Connected";
    }

    // 3. Dynamic Calculation (Fixed Rate Demo)
    document.getElementById("eth-amount").oninput = (e) => {
        const eth = e.target.value || 0;
        const tokens = (eth * 2500) / 0.1; // Demo Rate: $0.1 per AYB
        document.getElementById("est-tokens").innerText = `ESTIMATED: ${Math.floor(tokens).toLocaleString()} AYB`;
    };
</script>
</body>
</html>
