<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL | Secure Node Access</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { background: var(--card); border: 1px solid #30363d; padding: 2.2rem; border-radius: 28px; width: 90%; max-width: 420px; text-align: center; border-top: 4px solid var(--primary); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.5rem; letter-spacing: 2px; }
        
        /* Professional Countdown Styles */
        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 20px 0; }
        .timer-unit { background: #010409; padding: 10px; border-radius: 12px; border: 1px solid #30363d; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1.2rem; }
        .timer-label { font-size: 0.6rem; color: #8b949e; text-transform: uppercase; }

        .btn { background: var(--primary); color: #000; border: none; padding: 18px; border-radius: 14px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn:hover { box-shadow: 0 0 20px rgba(0,255,163,0.4); }
        
        .buy-interface { background: #010409; padding: 20px; border-radius: 18px; margin-top: 20px; display: none; text-align: left; border-left: 4px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.6rem; width: 100%; outline: none; margin-top: 5px; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    
    <div class="timer-grid">
        <div class="timer-unit"><span class="timer-val" id="days">90</span><span class="timer-label">Days</span></div>
        <div class="timer-unit"><span class="timer-val" id="hours">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-unit"><span class="timer-val" id="minutes">00</span><span class="timer-label">Min</span></div>
        <div class="timer-unit"><span class="timer-val" id="seconds">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="auth-area">
        <button id="connect-btn" class="btn">Connect Terminal</button>
        <p id="error-log" style="color: #ff7b72; font-size: 0.75rem; margin-top: 10px; display: none;"></p>
    </div>

    <div id="buy-area" class="buy-interface">
        <label style="font-size:0.65rem; color:#8b949e; font-weight:bold;">PAYMENT (ETH)</label>
        <input type="number" id="eth-input" placeholder="0.0">
        <button class="btn" style="margin-top:15px;">Purchase Now</button>
    </div>
</div>

<script>
    // 1. Precise 90-Day Countdown Logic
    const targetDate = new Date();
    targetDate.setDate(targetDate.getDate() + 90);

    function updateTimer() {
        const now = new Date().getTime();
        const diff = targetDate - now;
        document.getElementById('days').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('hours').innerText = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        document.getElementById('minutes').innerText = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        document.getElementById('seconds').innerText = Math.floor((diff % (1000 * 60)) / 1000);
    }
    setInterval(updateTimer, 1000);

    // 2. Advanced Connection Logic (PC Handling)
    document.getElementById("connect-btn").onclick = async () => {
        const errorLog = document.getElementById("error-log");
        errorLog.style.display = "none";

        if (window.ethereum) {
            try {
                // Force an immediate request - fixes "Action Required" on PC
                const accounts = await window.ethereum.request({ 
                    method: "wallet_requestPermissions", 
                    params: [{ eth_accounts: {} }] 
                });
                
                if (accounts) {
                    document.getElementById("auth-area").style.display = "none";
                    document.getElementById("buy-area").style.display = "block";
                }
            } catch (e) {
                errorLog.style.display = "block";
                errorLog.innerText = "Connection Pending: Please open MetaMask manually and enter your password.";
                console.error(e);
            }
        } else {
            const dappUrl = window.location.href.split('://')[1];
            window.location.href = `https://metamask.app.link/dapp/${dappUrl}`;
        }
    };
</script>
</body>
</html>
