<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB Token Presale | Secure Terminal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #00ffa3; --bg: #0d1117; --card: rgba(22, 27, 34, 0.95); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); border: 1px solid #30363d; padding: 2.5rem; border-radius: 20px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.6rem; margin-bottom: 0.5rem; }
        .subtitle { color: #8b949e; font-size: 0.85rem; margin-bottom: 2rem; }
        
        .input-group { background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 12px; border: 1px solid #30363d; margin-bottom: 1.5rem; text-align: left; }
        label { font-size: 0.7rem; color: #8b949e; text-transform: uppercase; letter-spacing: 1px; }
        input { background: transparent; border: none; color: white; font-size: 1.4rem; width: 100%; outline: none; margin-top: 5px; font-weight: bold; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 1.5rem; font-size: 0.85rem; color: #c9d1d9; }
        
        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 10px; width: 100%; font-weight: 800; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,255,163,0.2); }
        
        #status { margin-top: 1rem; font-size: 0.8rem; padding: 10px; border-radius: 8px; display: none; line-height: 1.4; }
        .error { background: rgba(255, 77, 77, 0.1); color: #ff7b72; border: 1px solid rgba(255, 77, 72, 0.2); }
        .success { background: rgba(0, 255, 163, 0.1); color: var(--primary); border: 1px solid rgba(0, 255, 163, 0.2); }
    </style>
</head>
<body>

<div class="container">
    <h1>AYB TERMINAL</h1>
    <div class="subtitle">Official Whitelisted Presale</div>

    <div id="connectArea">
        <button id="connectBtn" class="btn">CONNECT WALLET</button>
    </div>

    <div id="buyArea" style="display: none;">
        <div class="input-group">
            <label>Amount to Spend (ETH)</label>
            <input type="number" id="ethInput" placeholder="0.00" step="0.01" min="0.01">
        </div>
        
        <div class="stats">
            <span>Price: 0.01 ETH</span>
            <span id="tokenCalc">You get: 0 AYB</span>
        </div>

        <button id="buyBtn" class="btn">PURCHASE NOW</button>
    </div>

    <div id="status"></div>
</div>

<script>
    const CONTRACT_ADDRESS = "0xE6bBb6A5904045C4807C9139Ad2E7C5EcFCB0F94";
    const ABI = ["function buyTokens() external payable"];
    const TARGET_CHAIN = "0xa4b1"; // Arbitrum One

    const connectBtn = document.getElementById('connectBtn');
    const buyBtn = document.getElementById('buyBtn');
    const ethInput = document.getElementById('ethInput');
    const statusDiv = document.getElementById('status');

    function notify(msg, isError) {
        statusDiv.innerText = msg;
        statusDiv.className = isError ? 'error' : 'success';
        statusDiv.style.display = 'block';
    }

    ethInput.oninput = () => {
        const val = ethInput.value || 0;
        document.getElementById('tokenCalc').innerText = You get: ${val * 100} AYB;
    };

    connectBtn.onclick = async () => {
        if (!window.ethereum) {
            // Auto-redirect for mobile users
            window.location.href = "https://metamask.app.link/dapp/" + window.location.href.split('://')[1];
            return;
        }
        
        try {
            // Trigger popup explicitly
            await window.ethereum.request({ method: 'wallet_requestPermissions', params: [{ eth_accounts: {} }] });
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            
            const chainId = await window.ethereum.request({ method: 'eth_chainId' });
            if (chainId !== TARGET_CHAIN) {
                await window.ethereum.request({
                    method: 'wallet_switchEthereumChain',
                    params: [{ chainId: TARGET_CHAIN }],
                });
            }

            document.getElementById('connectArea').style.display = 'none';
            document.getElementById('buyArea').style.display = 'block';
            notify("Wallet Connected: " + accounts[0].substring(0,6) + "...", false);
        } catch (err) {
            notify(err.message, true);
        }
    };

    buyBtn.onclick = async () => {
        try {
            const amount = ethInput.value;
            if (amount <= 0) return notify("Please enter a valid amount", true);

            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, signer);

            notify("Please confirm transaction in wallet...", false);
            const tx = await contract.buyTokens({ value: ethers.parseEther(amount) });
            
            notify("Processing transaction...", false);
            await tx.wait();
            notify("Purchase Successful!", false);
        } catch (err) {
            notify("Failed: " + (err.reason || err.message), true);
        }
    };
</script>
</body>
</html>
